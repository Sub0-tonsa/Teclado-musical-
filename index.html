<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Teclado musical</title>
        <link rel="stylesheet" href="css/teclado.css">
    </head>
    <body>
        <nav>
            <h1>Teclado musical virtual</h1>
        </nav>
        <main>
            <div class="teclado">
                <div class="oitava" o1>
                    <div class="branca" data-nota="c1" data-tecla="z"></div>
                    <div class="preta" data-nota="cs1" data-tecla="s"></div>
                    <div class="branca" data-nota="d1" data-tecla="x"></div>
                    <div class="preta" data-nota="ds1" data-tecla="d"></div>
                    <div class="branca" data-nota="e1" data-tecla="c"></div>
                    <div class="branca" data-nota="f1" data-tecla="v"></div>
                    <div class="preta" data-nota="fs1" data-tecla="g"></div>
                    <div class="branca" data-nota="g1" data-tecla="b"></div>
                    <div class="preta" data-nota="gs1" data-tecla="h"></div>
                    <div class="branca" data-nota="a1" data-tecla="n"></div>
                    <div class="preta" data-nota="as1" data-tecla="j"></div>
                    <div class="branca" data-nota="b1" data-tecla="m"></div>
                </div>

                <div class="oitava" o2>
                    <div class="branca" data-nota="c2" data-tecla="q"></div>
                    <div class="preta" data-nota="cs2" data-tecla="2"></div>
                    <div class="branca" data-nota="d2" data-tecla="w"></div>
                    <div class="preta" data-nota="ds2" data-tecla="3"></div>
                    <div class="branca" data-nota="e2" data-tecla="e"></div>
                    <div class="branca" data-nota="f2" data-tecla="r"></div>
                    <div class="preta" data-nota="fs2" data-tecla="5"></div>
                    <div class="branca" data-nota="g2" data-tecla="t"></div>
                    <div class="preta" data-nota="gs2" data-tecla="6"></div>
                    <div class="branca" data-nota="a2" data-tecla="y"></div>
                    <div class="preta" data-nota="as2" data-tecla="7"></div>
                    <div class="branca" data-nota="b2" data-tecla="u"></div>
                </div>

                <div class="oitava" o3>
                    <div class="branca" data-nota="c3" data-tecla="i"></div>
                    <div class="preta" data-nota="cs3" data-tecla="9"></div>
                    <div class="branca" data-nota="d3" data-tecla="o"></div>
                    <div class="preta" data-nota="ds3" data-tecla="0"></div>
                    <div class="branca" data-nota="e3" data-tecla="p"></div>
                    <div class="branca" data-nota="f3" data-tecla="["></div>
                    <div class="preta" data-nota="fs3" data-tecla="-"></div>
                    <div class="branca" data-nota="g3" data-tecla="/"></div>
                    <div class="preta" data-nota="gs3" data-tecla="="></div>
                    <div class="branca" data-nota="a3" data-tecla="*"></div>
                    <div class="preta" data-nota="as3" data-tecla="+"></div>
                    <div class="branca" data-nota="b3" data-tecla=","></div>
                </div>
            </div>
            <script src="js/teclado.js"></script>
        </main>
        <footer>
            <p>&copy; <span id="ano-atual"></span> Desenvolvido por Giovanni Tonsa</p>
        </footer>
    </body>
</html>
